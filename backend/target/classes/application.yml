spring:
  application:
    name: hill-commerce-backend
  profiles:
    active: ${APP_PROFILE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hill_commerce}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:hill}
    password: ${DB_PASSWORD:hill123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
management:
  endpoints:
    web:
      exposure:
        include: health,info
server:
  port: ${SERVER_PORT:8080}
hill:
  security:
    session-cookie-name: HILL_COMMERCE_SESSION
  cache:
    enabled: ${CACHE_ENABLED:false}
  events:
    publisher: ${EVENT_PUBLISHER:local}
  rocketmq:
    enabled: ${ROCKETMQ_ENABLED:false}
    name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  analytics:
    hourly-snapshot-cron: "${ANALYTICS_HOURLY_SNAPSHOT_CRON:0 5 * * * *}"
    daily-summary-cron: "${ANALYTICS_DAILY_SUMMARY_CRON:0 30 0 * * *}"
    anomaly-check-cron: "${ANALYTICS_ANOMALY_CHECK_CRON:0 10 * * * *}"
  recommendation:
    gorse:
      enabled: ${GORSE_ENABLED:false}
      endpoint: ${GORSE_ENDPOINT:http://localhost:8088}
      timeout: ${GORSE_TIMEOUT:2s}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
