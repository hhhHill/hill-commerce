name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.7.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: hill_commerce
          MYSQL_USER: hill
          MYSQL_PASSWORD: hill123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -proot123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8.0
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: cd backend && mvn -B test
        env:
          GORSE_ENABLED: 'false'

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/next-app/package-lock.json

      - name: Install dependencies
        run: cd frontend/next-app && npm ci

      - name: Type check
        run: cd frontend/next-app && npx tsc --noEmit

      - name: Run tests
        run: cd frontend/next-app && npx jest --passWithNoTests
