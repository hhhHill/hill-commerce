name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.7.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: hill_commerce
          MYSQL_USER: hill
          MYSQL_PASSWORD: hill123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -proot123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8.0
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: cd backend && mvn -B test
        env:
          GORSE_ENABLED: 'false'

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/next-app/package-lock.json

      - name: Install dependencies
        run: cd frontend/next-app && npm ci

      - name: Type check
        run: cd frontend/next-app && npx tsc --noEmit

      - name: Run tests
        run: cd frontend/next-app && npx jest --passWithNoTests

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hill-commerce-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/next-app
          file: ./frontend/next-app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hill-commerce-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/hill-commerce/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/hill-commerce-backend:latest
            docker pull ghcr.io/${{ github.repository_owner }}/hill-commerce-frontend:latest
            cd /opt/hill-commerce
            docker compose up -d --remove-orphans
