[database]
cache_store = "redis://redis:6379"
data_store = "mysql://hill:hill123@tcp(mysql:3306)/gorse?parseTime=true"

[master]
port = 8086
host = "0.0.0.0"
http_port = 8088
http_host = "0.0.0.0"
n_jobs = 1
meta_timeout = "10s"

[server]
default_n = 10
auto_insert_user = true
auto_insert_item = true

[recommend]
cache_size = 100
fallback_recommend = ["popular", "latest"]

[recommend.data_source]
positive_feedback_types = ["view", "purchase"]
read_feedback_types = ["view"]

[recommend.collaborative]
num_epochs = 100
num_factors = 50
learning_rate = 0.005

[recommend.item_neighbors]
neighbor_type = "items"
