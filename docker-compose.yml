services:
  mysql:
    image: mysql:9.7.0
    container_name: hill-commerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hill_commerce
      MYSQL_USER: hill
      MYSQL_PASSWORD: hill123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.0
    container_name: hill-commerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    profiles: ["app"]
    build:
      context: ./backend
    container_name: hill-commerce-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_PROFILE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hill_commerce
      DB_USERNAME: hill
      DB_PASSWORD: hill123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend/next-app
    container_name: hill-commerce-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    profiles: ["app"]
    image: nginx:1.29-alpine
    container_name: hill-commerce-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  redis-data:
