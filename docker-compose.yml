services:
  mysql:
    # Downgrading from 9.7 data files to 8.4 is not in-place safe; use logical dump/restore before recreating this container.
    image: mysql:8.4.10
    container_name: hill-commerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hill_commerce
      MYSQL_USER: hill
      MYSQL_PASSWORD: hill123
    ports:
      - "3306:3306"
    volumes:
      - mysql84-data:/var/lib/mysql
      - ./ops/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.0
    container_name: hill-commerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: hill-commerce-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  gorse:
    image: zhenghaoz/gorse-in-one:latest
    container_name: hc-gorse
    ports:
      - "8086:8086"
      - "8088:8088"
    command: >
      -c /etc/gorse/config.toml
      --log-path /var/log/gorse/master.log
    volumes:
      - ./ops/gorse/config.toml:/etc/gorse/config.toml:ro
      - gorse-data:/var/lib/gorse
      - gorse-log:/var/log/gorse
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  backend:
    profiles: ["app"]
    build:
      context: ./backend
    container_name: hill-commerce-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_PROFILE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hill_commerce
      DB_USERNAME: hill
      DB_PASSWORD: hill123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      GORSE_ENABLED: "true"
      GORSE_ENDPOINT: http://gorse:8088
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend/next-app
    container_name: hill-commerce-frontend
    depends_on:
      - backend
    environment:
      HILL_BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    profiles: ["app"]
    image: nginx:1.29-alpine
    container_name: hill-commerce-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  mysql84-data:
  mysql-data:
  redis-data:
  gorse-data:
  gorse-log:
